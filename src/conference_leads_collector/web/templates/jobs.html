<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Jobs</title>
    <style>
      body { font-family: sans-serif; margin: 24px; }
      table { border-collapse: collapse; width: 100%; }
      th, td { border: 1px solid #ddd; padding: 8px; vertical-align: top; }
      th { text-align: left; background: #f6f6f6; }
    </style>
  </head>
  <body>
    <h1>Jobs</h1>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Type</th>
          <th>Target</th>
          <th>Status</th>
          <th>Error</th>
        </tr>
      </thead>
      <tbody>
        {% for job in jobs %}
        <tr>
          <td>{{ job.id }}</td>
          <td>{{ job.job_type }}</td>
          <td>{{ job.target_id }}</td>
          <td>{{ job.status }}</td>
          <td>{{ job.last_error or "" }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </body>
</html>

<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title }}</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f6f2;
        --surface: rgba(255, 255, 255, 0.92);
        --surface-strong: #ffffff;
        --text: #111111;
        --muted: #6f6f6a;
        --line: rgba(17, 17, 17, 0.1);
        --line-strong: rgba(17, 17, 17, 0.18);
        --shadow: 0 18px 60px rgba(17, 17, 17, 0.06);
        --radius-xl: 28px;
        --radius-lg: 20px;
        --radius-md: 14px;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "SF Pro Display", "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(17, 17, 17, 0.045), transparent 28%),
          linear-gradient(180deg, #fcfcfa 0%, var(--bg) 100%);
      }

      a { color: inherit; text-decoration: none; }

      .shell {
        max-width: 1320px;
        margin: 0 auto;
        padding: 28px 24px 60px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
        padding: 18px 22px;
        background: rgba(255, 255, 255, 0.76);
        border: 1px solid rgba(255, 255, 255, 0.7);
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
        border-radius: 999px;
        margin-bottom: 28px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .brand-mark {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        background: #111111;
        color: #ffffff;
        display: grid;
        place-items: center;
        font-size: 12px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .brand-copy strong {
        display: block;
        font-size: 15px;
        font-weight: 600;
        letter-spacing: -0.02em;
      }

      .brand-copy span {
        display: block;
        margin-top: 2px;
        color: var(--muted);
        font-size: 12px;
      }

      .nav {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .nav-link {
        padding: 10px 14px;
        border-radius: 999px;
        color: var(--muted);
        font-size: 14px;
        transition: all 0.18s ease;
      }

      .nav-link:hover {
        color: var(--text);
        background: rgba(17, 17, 17, 0.05);
      }

      .nav-link.active {
        background: #111111;
        color: #ffffff;
      }

      .nav-group {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1.5fr) minmax(320px, 0.9fr);
        gap: 22px;
        margin-bottom: 22px;
      }

      .hero-card, .panel, .table-shell {
        background: var(--surface);
        border: 1px solid var(--line);
        box-shadow: var(--shadow);
        border-radius: var(--radius-xl);
      }

      .hero-card {
        padding: 32px;
      }

      .eyebrow {
        color: var(--muted);
        font-size: 13px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 10px 0 14px;
        font-size: clamp(36px, 5vw, 56px);
        line-height: 0.95;
        letter-spacing: -0.05em;
        font-weight: 600;
      }

      .lead {
        max-width: 52ch;
        margin: 0;
        color: var(--muted);
        font-size: 17px;
        line-height: 1.65;
      }

      .hero-meta {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 24px;
      }

      .meta-pill {
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.6);
        font-size: 13px;
        color: var(--muted);
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .stat-card {
        padding: 20px;
        border-radius: var(--radius-lg);
        background: var(--surface-strong);
        border: 1px solid var(--line);
      }

      .stat-label {
        display: block;
        color: var(--muted);
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .stat-value {
        display: block;
        margin-top: 12px;
        font-size: 34px;
        line-height: 1;
        letter-spacing: -0.05em;
      }

      .content-grid {
        display: grid;
        gap: 22px;
      }

      .action-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 18px;
      }

      .panel {
        padding: 24px;
      }

      .panel h2 {
        margin: 0 0 8px;
        font-size: 22px;
        letter-spacing: -0.04em;
      }

      .panel p {
        margin: 0 0 18px;
        color: var(--muted);
        line-height: 1.6;
      }

      textarea {
        width: 100%;
        min-height: 160px;
        resize: vertical;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.92);
        padding: 16px 18px;
        font: inherit;
        color: var(--text);
        outline: none;
        transition: border-color 0.18s ease, box-shadow 0.18s ease;
      }

      textarea:focus {
        border-color: rgba(17, 17, 17, 0.24);
        box-shadow: 0 0 0 4px rgba(17, 17, 17, 0.05);
      }

      .button-row {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      button, .ghost-link {
        appearance: none;
        border: 0;
        border-radius: 999px;
        padding: 13px 18px;
        font: inherit;
        font-size: 14px;
        cursor: pointer;
        transition: transform 0.18s ease, opacity 0.18s ease, background 0.18s ease;
      }

      button:hover, .ghost-link:hover { transform: translateY(-1px); }

      .button-primary {
        background: #111111;
        color: #ffffff;
      }

      .button-secondary, .ghost-link {
        background: rgba(17, 17, 17, 0.06);
        color: var(--text);
      }

      .result-box {
        margin: 0;
        padding: 20px;
        border-radius: var(--radius-lg);
        background: #111111;
        color: #f5f5f0;
        min-height: 120px;
        overflow: auto;
        font-size: 13px;
        line-height: 1.7;
      }

      .section-head {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 14px;
      }

      .section-head h2 {
        margin: 0;
        font-size: 28px;
        letter-spacing: -0.04em;
      }

      .section-head p {
        margin: 0;
        color: var(--muted);
      }

      .table-shell {
        overflow: hidden;
      }

      .table-scroll {
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
      }

      th, td {
        padding: 18px 20px;
        border-bottom: 1px solid var(--line);
        text-align: left;
        vertical-align: top;
      }

      th {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        font-weight: 600;
        background: rgba(17, 17, 17, 0.025);
      }

      tr:last-child td { border-bottom: none; }

      .mono { font-variant-numeric: tabular-nums; }
      .muted { color: var(--muted); }

      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(17, 17, 17, 0.06);
        color: var(--text);
        font-size: 13px;
      }

      .status-pill::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #111111;
      }

      .list-compact {
        margin: 0;
        padding-left: 18px;
      }

      .list-compact li + li {
        margin-top: 8px;
      }

      .empty-state {
        padding: 34px 24px;
        color: var(--muted);
        text-align: center;
      }

      .page-note {
        margin-top: 6px;
        color: var(--muted);
        font-size: 14px;
      }

      .text-wrap {
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      .cell-stack {
        display: grid;
        gap: 8px;
      }

      .mini-list {
        display: grid;
        gap: 8px;
      }

      .mini-item {
        padding: 10px 12px;
        border-radius: 14px;
        background: rgba(17, 17, 17, 0.035);
        overflow-wrap: anywhere;
      }

      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
        margin-bottom: 14px;
      }

      @media (max-width: 1100px) {
        .hero, .action-grid { grid-template-columns: 1fr; }
      }

      @media (max-width: 720px) {
        .shell { padding: 18px 14px 40px; }
        .topbar {
          border-radius: 28px;
          padding: 18px;
          align-items: flex-start;
          flex-direction: column;
        }
        .stats-grid { grid-template-columns: 1fr 1fr; }
        th, td { padding: 14px; }
        .table-shell { overflow-x: auto; }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">PE</div>
          <div class="brand-copy">
            <strong>Parser Event</strong>
            <span>Внутренняя панель сбора конференций и TenChat</span>
          </div>
        </div>
        <nav class="nav">
          <div class="nav-group">
            <a class="nav-link {% if current_page == 'dashboard' %}active{% endif %}" href="/?token={{ token or '' }}">Обзор</a>
            <a class="nav-link {% if current_page == 'sources' %}active{% endif %}" href="/sources?token={{ token or '' }}">Конференции</a>
            <a class="nav-link {% if current_page == 'speakers' %}active{% endif %}" href="/speakers?token={{ token or '' }}">Спикеры</a>
            <a class="nav-link {% if current_page == 'sponsors' %}active{% endif %}" href="/sponsors?token={{ token or '' }}">Спонсоры</a>
            <a class="nav-link {% if current_page == 'jobs' %}active{% endif %}" href="/jobs?token={{ token or '' }}">Очередь</a>
            <a class="nav-link {% if current_page == 'tenchat' %}active{% endif %}" href="/tenchat?token={{ token or '' }}">TenChat</a>
          </div>
        </nav>
      </header>
      {% block content %}{% endblock %}
    </div>
    {% block scripts %}{% endblock %}
  </body>
</html>
